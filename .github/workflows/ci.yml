name: refusal-receipt-chain-ci

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pinned dependencies
        run: python -m pip install -r requirements.txt

      - name: Replay ALLOW receipt
        run: python replay.py sample_allow_receipt.json

      - name: Replay DENY receipt
        run: python replay.py sample_deny_receipt.json

      - name: Replay HOLD receipt
        run: python replay.py sample_hold_receipt.json

      - name: Verify ALLOW -> DENY -> HOLD chain
        run: python chain_verify.py sample_allow_receipt.json sample_deny_receipt.json sample_hold_receipt.json

      - name: Run receipt-gated adapter with ALLOW receipt
        run: python -m adapter.enforcement_adapter adapter/sample_action_request.json sample_allow_receipt.json

      - name: Run validation tests
        run: python -m unittest discover -s tests -t .
